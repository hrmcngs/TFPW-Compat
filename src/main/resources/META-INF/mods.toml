modLoader="javafml"
loaderVersion="[47,)"
license="Academic Free License v3.0"
issueTrackerURL="https://github.com/Drowse-Lab/The-four-primitives-and-Weapons/issues"

[[mods]]
modId="tfpw_compat"
version="${version}"
displayName="TFPW-Compat"
credits="hrmcngs"
authors="hrmcngs"
description='''
The four primitives and Weapons のアドオン。
Ice and Fire (ドラゴン) / Mekanism との連携を提供する。
連携先 MOD はいずれも任意 (無くてもロードは成功する)。
'''

# ── Minecraft は必須 ────────────────────────────────────────────────
[[dependencies.tfpw_compat]]
    modId="minecraft"
    mandatory=true
    versionRange="[${mc_version}]"
    ordering="NONE"
    side="BOTH"

# ── 依存 ────────────────────────────────────────────────────────────
# 本体 MOD (属性システム提供元)。無い場合は連携そのものが no-op なので任意。
[[dependencies.tfpw_compat]]
    modId="the_four_primitives_and_weapons"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

# Ice and Fire: Community Edition (ドラゴン) — 必須。
#   属性ドラゴンの描画に IaF のドラゴンモデル (firedragon_ground.tbl) を使うため、
#   無いと見た目が成立しない。A-4 の属性紐付け / ドラゴン素材武器のレシピもこれに依存する。
[[dependencies.tfpw_compat]]
    modId="iceandfire"
    mandatory=true
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

# uranus (Ice and Fire CE のライブラリ) — 必須。
#   client/IafDragonRenderer が uranus の TabulaModel / TabulaModelHandlerHelper を
#   直接参照する。IaF 自身も uranus を mandatory 依存しているので実質同時に入るが、
#   直接リンクしている以上ここでも明示しておく。
[[dependencies.tfpw_compat]]
    modId="uranus"
    mandatory=true
    versionRange="[2,)"
    ordering="AFTER"
    side="BOTH"

# Mekanism 本体。
[[dependencies.tfpw_compat]]
    modId="mekanism"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

# Mekanism Generators (発電機構を使うなら)。
[[dependencies.tfpw_compat]]
    modId="mekanismgenerators"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"
