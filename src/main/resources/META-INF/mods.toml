modLoader="javafml"
loaderVersion="[47,)"
license="Academic Free License v3.0"
issueTrackerURL="https://github.com/Drowse-Lab/The-four-primitives-and-Weapons/issues"

[[mods]]
modId="tfpw_compat"
version="${version}"
displayName="TFPW-Compat"
credits="hiromichi-ngs"
authors="hiromichi-ngs"
description='''
The four primitives and Weapons のアドオン。
Ice and Fire (ドラゴン) / Mekanism との連携を提供する。
連携先 MOD はいずれも任意 (無くてもロードは成功する)。
'''

# ── Minecraft は必須 ────────────────────────────────────────────────
[[dependencies.tfpw_compat]]
    modId="minecraft"
    mandatory=true
    versionRange="[${mc_version}]"
    ordering="NONE"
    side="BOTH"

# ── 連携対象はすべて任意 (mandatory=false)。ロード順だけ AFTER にする ──
# 本体 MOD (属性システム提供元)。無い場合は連携そのものが no-op。
[[dependencies.tfpw_compat]]
    modId="the_four_primitives_and_weapons"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

# Ice and Fire (ドラゴン)。modId は実 jar で要確認 (iceandfire が一般的)。
[[dependencies.tfpw_compat]]
    modId="iceandfire"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

# Mekanism 本体。
[[dependencies.tfpw_compat]]
    modId="mekanism"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"

# Mekanism Generators (発電機構を使うなら)。
[[dependencies.tfpw_compat]]
    modId="mekanismgenerators"
    mandatory=false
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"
