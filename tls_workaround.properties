# Cisco Umbrella SSL Inspection 回避用 Java security override
#
# 経緯:
#   このプロジェクトを使う環境のネットワーク (マンション/集合住宅 ISP) が
#   Cisco Umbrella の透過 SSL 検査を経由しており、 中間 Proxy が古くて
#   TLS 1.3 や ECDHE/DHE PFS 系の cipher suite を理解できない。
#   結果として JDK 17 が ClientHello を送ると handshake_failure になる。
#
# 解法:
#   1. JDK 17 でデフォルト無効化されている RSA-only cipher を許可リストに戻す
#   2. TLS 1.2 のみで握手するよう gradle.properties で強制
#   3. cipher suite を RSA 系に限定 (gradle.properties)
#
# 注意:
#   本来非推奨の RSA キー交換を有効化する → Forward Secrecy を失う。
#   開発端末 + 信頼できないネット の組み合わせで mod ビルドを通すための個人負荷の対応。
#   公開サーバや production には使わない。
#
# 参照: -Djava.security.properties=/path/to/tls_workaround.properties で JVM に渡す

# デフォルトの disabledAlgorithms から TLS_RSA_* 系を除外
# ( = TLS_RSA_WITH_AES_256_GCM_SHA384 等を再有効化 )
jdk.tls.disabledAlgorithms=SSLv3, TLSv1, TLSv1.1, RC4, DES, MD5withRSA, DH keySize < 1024, EC keySize < 224, 3DES_EDE_CBC, anon, NULL
